<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小红书爆款标题生成器</title>
    <meta name="description" content="AI智能生成小红书爆款标题，一键生成10个吸引人的标题">
    <meta name="theme-color" content="#9333ea">
    <link rel="manifest" href="/xiaohongshu-title-generator/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #FFF5FC 0%, #FFF0F5 50%, #FFFFFF 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
        }
        
        .bg-circle-1 {
            width: 300px;
            height: 300px;
            background: rgba(168, 85, 247, 0.2);
            top: -100px;
            right: -100px;
        }
        
        .bg-circle-2 {
            width: 200px;
            height: 200px;
            background: rgba(236, 72, 153, 0.15);
            top: 50%;
            left: -80px;
        }
        
        .bg-circle-3 {
            width: 150px;
            height: 150px;
            background: rgba(59, 130, 246, 0.1);
            bottom: 100px;
            right: 20%;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #D633FF, #FF4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .header h1 .icon {
            font-size: 24px;
            -webkit-text-fill-color: initial;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Card */
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.1);
            padding: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        /* Label */
        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .badge {
            background: linear-gradient(90deg, #8B5CF6, #EC4899);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .label-text {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        /* Textarea */
        .textarea-wrapper {
            position: relative;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            background: #FAFAFA;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        
        textarea:focus {
            border-color: #A855F7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }
        
        textarea::placeholder {
            color: #9CA3AF;
        }
        
        textarea:disabled {
            background: #F3F4F6;
            cursor: not-allowed;
        }
        
        /* Footer */
        .textarea-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 0 4px;
        }
        
        .char-count {
            font-size: 12px;
            color: #9CA3AF;
        }
        
        .clear-btn {
            font-size: 12px;
            color: #9CA3AF;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .clear-btn:hover {
            color: #6B7280;
            background: #F3F4F6;
        }
        
        .clear-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 16px 24px;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(90deg, #8A2BE2, #FF4081);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.4);
        }
        
        .generate-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .generate-btn:disabled {
            background: linear-gradient(90deg, #9CA3AF, #D1D5DB);
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Output */
        .output {
            margin-top: 16px;
            display: none;
        }
        
        .output.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .output-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .output-title .dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .copy-btn {
            font-size: 12px;
            color: #6B7280;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            color: #8B5CF6;
            background: #F3E8FF;
        }
        
        .copy-btn.copied {
            color: #10B981;
        }
        
        .output-content {
            background: linear-gradient(135deg, #FAFAFA 0%, #F3E8FF 100%);
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .output-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 0;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .output-item:last-child {
            border-bottom: none;
        }
        
        .output-item .num {
            color: #8B5CF6;
            font-weight: 600;
            min-width: 24px;
        }
        
        /* Tips */
        .tips {
            margin-top: 16px;
            background: linear-gradient(135deg, #FAF5FF 0%, #FDF2F8 100%);
            border: 1px solid rgba(168, 85, 247, 0.1);
            border-radius: 12px;
            padding: 16px;
        }
        
        .tips-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tips ul {
            list-style: none;
        }
        
        .tips li {
            font-size: 13px;
            color: #666;
            padding: 4px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .tips li::before {
            content: "•";
            color: #A855F7;
            font-weight: bold;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9CA3AF;
        }
        
        /* Error state */
        .error {
            color: #EF4444;
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <h1>
                <span class="icon">✨</span>
                小红书爆款标题生成器
            </h1>
            <p>AI 智能生成，一秒出10个爆款标题</p>
        </header>
        
        <main class="card">
            <div class="label">
                <span class="badge">AI 驱动</span>
                <span class="label-text">输入你的笔记内容</span>
            </div>
            
            <div class="textarea-wrapper">
                <textarea 
                    id="input" 
                    placeholder="描述你的产品、服务或内容主题，AI 将为你生成吸引人的标题..."
                ></textarea>
            </div>
            
            <div class="textarea-footer">
                <span class="char-count" id="charCount">0 字符</span>
                <button class="clear-btn" id="clearBtn" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    清空
                </button>
            </div>
            
            <button class="generate-btn" id="generateBtn" disabled>
                <span id="btnIcon">✨</span>
                <span id="btnText">开始生成</span>
            </button>
            
            <div class="output" id="output">
                <div class="output-header">
                    <div class="output-title">
                        <span class="dot"></span>
                        生成结果
                    </div>
                    <button class="copy-btn" id="copyBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                        <span id="copyText">复制</span>
                    </button>
                </div>
                <div class="output-content" id="outputContent"></div>
            </div>
            
            <div class="tips" id="tips">
                <div class="tips-title">💡 使用技巧</div>
                <ul>
                    <li>描述要具体，包括产品特点、用户痛点或使用场景</li>
                    <li>加入关键词，如"必备"、"神级"、"亲测"等</li>
                    <li>可以提及目标人群，如"学生党"、"宝妈"等</li>
                    <li>描述你的内容价值，如"省钱"、"提升效率"等</li>
                </ul>
            </div>
        </main>
        
        <footer class="footer">
            <p>基于大语言模型，生成结果仅供参考</p>
        </footer>
    </div>
    
    <script>
        // API 配置
        const API_CONFIG = {
            baseUrl: 'https://api.deepseek.com/v1',
            model: 'deepseek-chat',
            apiKey: 'sk-ff8b80e42a984fdb92ea91cb63092fd6'
        };
        
        const SYSTEM_PROMPT = `你是一个专业的小红书爆款标题生成器。请根据用户提供的内容，生成10个吸引人的爆款标题。

要求：
1. 每个标题都要有吸引力，能激发点击欲望
2. 使用小红书常用的表达方式（emoji、感叹号、疑问句）
3. 标题要简洁明了，控制在20字以内
4. 每个标题单独一行显示，用数字编号
5. 标题要符合小红书用户的兴趣点和痛点

请直接输出标题列表，不需要任何解释或前言。`;
        
        // DOM 元素
        const input = document.getElementById('input');
        const charCount = document.getElementById('charCount');
        const clearBtn = document.getElementById('clearBtn');
        const generateBtn = document.getElementById('generateBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const output = document.getElementById('output');
        const outputContent = document.getElementById('outputContent');
        const copyBtn = document.getElementById('copyBtn');
        const copyText = document.getElementById('copyText');
        const tips = document.getElementById('tips');
        
        let isGenerating = false;
        let currentOutput = '';
        
        // 输入事件
        input.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = length + ' 字符';
            clearBtn.disabled = length === 0;
            generateBtn.disabled = length === 0 || isGenerating;
        });
        
        // 清空按钮
        clearBtn.addEventListener('click', function() {
            input.value = '';
            charCount.textContent = '0 字符';
            clearBtn.disabled = true;
            generateBtn.disabled = true;
            output.classList.remove('show');
            tips.style.display = 'block';
            currentOutput = '';
        });
        
        // 生成按钮
        generateBtn.addEventListener('click', generate);
        
        // 复制按钮
        copyBtn.addEventListener('click', async function() {
            if (!currentOutput) return;
            
            try {
                await navigator.clipboard.writeText(currentOutput);
                copyText.textContent = '已复制';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyText.textContent = '复制';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('复制失败:', err);
            }
        });
        
        // 生成函数
        async function generate() {
            const text = input.value.trim();
            if (!text || isGenerating) return;
            
            isGenerating = true;
            currentOutput = '';
            
            // 更新UI状态
            generateBtn.disabled = true;
            btnIcon.innerHTML = '<div class="spinner"></div>';
            btnText.textContent = '正在生成...';
            input.disabled = true;
            output.classList.remove('show');
            tips.style.display = 'none';
            
            try {
                const response = await fetch(`${API_CONFIG.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.8,
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                output.classList.add('show');
                outputContent.innerHTML = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (data === '[DONE]' || !data) continue;
                            
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices?.[0]?.delta?.content;
                                if (content) {
                                    currentOutput += content;
                                    renderOutput(currentOutput);
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
            } catch (error) {
                console.error('生成错误:', error);
                output.classList.add('show');
                outputContent.innerHTML = `<div class="error">❌ 生成失败: ${error.message}</div>`;
            } finally {
                isGenerating = false;
                generateBtn.disabled = input.value.length === 0;
                btnIcon.textContent = '✨';
                btnText.textContent = '开始生成';
                input.disabled = false;
            }
        }
        
        // 渲染输出
        function renderOutput(text) {
            const lines = text.split('\n').filter(line => line.trim());
            let html = '';
            
            lines.forEach((line, index) => {
                const match = line.match(/^(\d+)[.、]\s*(.*)$/);
                if (match) {
                    html += `<div class="output-item"><span class="num">${match[1]}.</span><span>${match[2]}</span></div>`;
                } else if (line.trim()) {
                    html += `<div class="output-item"><span class="num">${index + 1}.</span><span>${line}</span></div>`;
                }
            });
            
            outputContent.innerHTML = html;
        }
    </script>
</body>
</html>
